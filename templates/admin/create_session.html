{% extends "base.html" %}
{% block title %}Nouvelle session — Vero{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Nouvelle session</h2>
        <form method="POST" action="/admin/create" class="mt-3">
            <div class="mb-3">
                <label for="firm_name" class="form-label">Nom du cabinet</label>
                <input type="text" class="form-control" id="firm_name" name="firm_name" required>
            </div>
            <div class="mb-3">
                <label for="contact_name" class="form-label">Nom du contact</label>
                <input type="text" class="form-control" id="contact_name" name="contact_name" required>
            </div>
            <div class="mb-3">
                <label for="contact_email" class="form-label">Courriel du contact</label>
                <input type="email" class="form-control" id="contact_email" name="contact_email" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Créer la session</button>
                <a href="/admin" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
