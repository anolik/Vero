<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vero{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Vero</a>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}
        <div class="text-center py-5">
            <h1>Vero</h1>
            <p class="lead">Collecteur d'informations pour sites web de représentants</p>
            <a href="/admin" class="btn btn-primary">Accès administration</a>
        </div>
        {% endblock %}
    </main>

    <footer class="container text-center text-muted py-3 border-top mt-4">
        <small>&copy; 2026 Vero</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
