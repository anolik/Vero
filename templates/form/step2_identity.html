{% extends "base.html" %}
{% block title %}Identite — Vero{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        {% include "form/_stepper.html" %}

        <h2 class="mb-3">Informations personnelles</h2>
        <p class="text-muted mb-4">
            Ces informations seront utilisees pour votre site web professionnel.
        </p>

        <form method="POST" action="/form/{{ token }}/step/2">
            <div class="card">
                <div class="card-body">
                    <div class="mb-3">
                        <label for="first_name" class="form-label">Prenom <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="first_name" name="first_name"
                               value="{{ saved.get('first_name', '') }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="last_name" class="form-label">Nom <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="last_name" name="last_name"
                               value="{{ saved.get('last_name', '') }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Courriel <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email" name="email"
                               value="{{ saved.get('email', '') }}" required>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a href="/form/{{ token }}/step/1" class="btn btn-outline-secondary">Retour</a>
                <button type="submit" class="btn btn-primary">Continuer</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
